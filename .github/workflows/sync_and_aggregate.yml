name: Scrape and Aggregate Reports

on:
  schedule:
    - cron: '0 5 * * *' # 5:00 UTC = 13:00 Beijing Time
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  scrape_and_aggregate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout target repository
      uses: actions/checkout@v3
        
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Scraper and Aggregator
      run: |
        python scrape_and_aggregate.py
        
    - name: Commit and Push Changes
      run: |
        git add .
        # Only commit if there are changes
        git commit -m "Auto-scrape and aggregate reports [skip ci]" || echo "No changes to commit"
        git push origin main
