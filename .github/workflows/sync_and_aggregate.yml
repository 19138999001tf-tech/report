name: Sync and Aggregate Reports

on:
  schedule:
    - cron: '10 9 * * *' # 9:10 UTC = 17:10 Beijing Time (For testing)
  workflow_dispatch: # Allows manual trigger from GitHub UI

jobs:
  sync_and_aggregate:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout target repository
      uses: actions/checkout@v3
      with:
        fetch-depth: 0 # Fetch all history so we can merge properly
        
    - name: Configure Git
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        
    - name: Add upstream remote and fetch
      run: |
        git remote add upstream https://github.com/manymore13/report.git
        git fetch upstream
        
    - name: Merge upstream/main into current branch
      run: |
        # Allow unrelated histories in case the forks diverged completely
        git merge upstream/main --allow-unrelated-histories --strategy-option=theirs -m "Auto-merge upstream main" || echo "Merge encountered conflicts. Using upstream versions..."
        
    - name: Setup Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas
        
    - name: Run Aggregate Script
      run: |
        python aggregate_all.py
        
    - name: Commit and Push Changes
      run: |
        git add .
        # Only commit if there are changes
        git commit -m "Auto-sync and aggregate reports [skip ci]" || echo "No changes to commit"
        git push origin main
